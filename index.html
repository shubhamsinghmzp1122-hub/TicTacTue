<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>TIC TAC TOE — shubhiXarpit (Pro Online)</title>
<style>
  /* Basic Reset and Layout */
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{ background:#0a0a20; display:flex; align-items:center; justify-content:center; height:100vh; color:white; overflow:hidden; transition:background 0.5s, color 0.5s; }
  
  /* ⭐ THEME FIX: DARK/LIGHT MODE ⭐ */
  body.dark { background: #000000; color: #f0f0f0; } .lobby.dark { background: linear-gradient(145deg, #0a0a0a, #1a1a1a); color: #f0f0f0; } .lobby.dark h1 { text-shadow: 2px 2px 5px rgba(0,0,0,0.9), 0 0 10px #00ffff, 0 0 20px #00ffff !important; color: #fff; } .lobby.dark .btn { border-color: #00ffff; color: #00ffff; } .lobby.dark .btn:hover { background: #00ffff !important; color: #000 !important; box-shadow: 0 0 20px #00ffff; }
  body.light { background: #f0f0f0; color: #333; } .lobby.light { background: linear-gradient(145deg, #ffffff, #e0e0e0); color: #333; } .lobby.light h1 { text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.9) !important; color: #333; animation: none !important; } .lobby.light .btn { border-color: #333 !important; color: #333 !important; background: rgba(255, 255, 255, 0.8) !important; text-shadow: none !important; } .lobby.light .btn:hover { background: #333 !important; color: #fff !important; box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); } .game-board.light .board { border: 2px solid #333; background: #ccc !important; } .game-board.light .cell { background: #f0f0f0 !important; border: 2px solid #333; } .game-board.light #backLobbyBtn { border: 2px solid #333 !important; color: #333 !important; background: linear-gradient(90deg, #ccc, #eee) !important; box-shadow: 0 0 5px rgba(0, 0, 0, 0.3) !important; text-shadow: none !important; } .game-board.light .scoreboard, .game-board.light #modeTitle { color: #333 !important; text-shadow: 1px 1px 3px rgba(255,255,255,0.9) !important; }
  
  /* Splash & Loading */
  #splash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; transition: opacity 1s ease-out, transform 1s ease-out; transform: scale(1); opacity: 1; }
  .splash-logo { font-size: 120px; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px #00ffff, 0 0 25px #00ffff, 0 0 40px #ff00ff, 0 0 60px #ff00ff; animation: neonScale 3s ease-in-out infinite alternate, neonPulse 2s ease-in-out infinite alternate; transform: scale(0.9); }
  @keyframes neonScale { 0%, 100% { transform: scale(0.95); } 50% { transform: scale(1.05); } } @keyframes neonPulse { 0%, 100% { text-shadow: 0 0 15px #00ffff, 0 0 30px #ff00ff; } 50% { text-shadow: 0 0 25px #ffffff, 0 0 50px #00ffff, 0 0 75px #ff00ff; } }
  .particle-container { position: absolute; width: 100%; height: 100%; z-index: 999; opacity: 0.7; } .particle { position: absolute; background: #ffffff; border-radius: 50%; animation: particle-drift linear infinite; }
  @keyframes particle-drift { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(100vw, 100vh) scale(0.5); opacity: 0; } }
  #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 101; opacity: 0; transition: opacity 1s ease-out; pointer-events: none; }
  #loading-overlay h2 { font-size: 50px; letter-spacing: 5px; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; animation: neonLoadPulse 1.5s infinite alternate; margin-bottom: 20px; }
  .loading-bar-container { width: 70%; max-width: 500px; height: 25px; background: #333; border: 2px solid #00ffff; border-radius: 15px; overflow: hidden; margin-bottom: 15px; } .loading-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffff, #ff00ff); border-radius: 12px; transition: width 0.1s linear; } .loading-percentage { font-size: 20px; color: #00ffff; text-shadow: 0 0 8px #00ffff; }

  /* Main UI */
  .lobby, .game-board{ position:absolute;top:0;left:0;width:100%;height:100%; display:flex;flex-direction:column;align-items:center;justify-content:center; transition:0.5s; z-index: 5; text-align: center; }
  .lobby{background:linear-gradient(145deg,#1a002a,#002147);} 
  h1, #modeTitle, .scoreboard, #level-info-text { font-weight: 900 !important; text-shadow: 2px 2px 5px rgba(0,0,0,0.9), 0 0 15px currentColor !important; z-index: 10; }
  h1{ font-size:40px; letter-spacing:3px; margin-bottom:30px; animation: neonLobbyPulse 2s infinite alternate; }
  .btn{ background: rgba(0, 0, 0, 0.7) !important; border: 2px solid #00ffff; color: white; font-size: 20px; padding: 10px 30px; margin: 8px; border-radius: 15px; cursor: pointer; transition: 0.3s; z-index: 15; font-weight: 900; } .btn:hover{ background: #00ffff !important; color: #000 !important; box-shadow: 0 0 20px #00ffff; }
  .board{ position:relative; display:grid; grid-template-columns:repeat(3,100px); grid-template-rows:repeat(3,100px); gap:8px; margin-top:20px; padding:10px; border-radius:15px; background: rgba(10, 10, 10, 0.8) !important; border: 2px solid #00ffff; transition: 0.3s; z-index: 15; }
  .cell{ width:100px; height:100px; background: rgba(0, 0, 0, 0.6) !important; border:2px solid #00ffff; border-radius:10px; font-size:60px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; user-select:none; z-index: 16; } .winningCell{animation:winFlash 0.8s infinite alternate;}
  .winning-line{ position:absolute; height:8px; background:#00ff4d; box-shadow:0 0 12px #00ff4d, 0 0 24px #00ff4d; border-radius:8px; transform-origin:center center; z-index:20; display:none; }
  .popup{ position:absolute;top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.9); display:flex;align-items:center;justify-content:center; font-size:50px;flex-direction:column;display:none;z-index:30; text-align: center; }
  .popup button{margin-top:20px;padding:10px 20px;background:#00ffff;border:none;border-radius:10px;font-size:18px;cursor:pointer; font-weight: bold;}
  #backLobbyBtn{ position:absolute; top:20px; right:20px; border:2px solid #00ffff; color:#000; padding:10px 20px; border-radius:15px; cursor:pointer; transition:0.3s; background:linear-gradient(90deg,#00ffff,#ff00ff) !important; font-weight:bold; box-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff; z-index: 15; }
  #settingBtn{ position: absolute; top: 20px; left: 20px; padding: 8px 15px; border-radius: 12px; cursor: pointer; background: #00ffff !important; color: #000000 !important; border: 2px solid #ffffff !important; font-weight: 900 !important; box-shadow: 0 0 15px rgba(0, 255, 255, 0.8) !important; z-index: 100 !important; display:flex; align-items:center; gap:5px; }

  /* Room Modals */
  .room-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
  .room-box { background: #111; padding: 30px; border: 2px solid #00ffff; border-radius: 15px; text-align: center; box-shadow: 0 0 20px #00ffff; max-width: 90%; }
  #roomCodeDisplay { font-size: 60px; color: #ff00ff; letter-spacing: 10px; text-shadow: 0 0 20px #ff00ff; margin: 20px 0; display: none; }
  #roomCodeInput { font-size: 40px; text-align: center; width: 200px; padding: 10px; border: 2px solid #ff00ff; background: #222; color: white; margin-bottom: 20px; display: none; outline: none; }

  /* Level System */
  #level-system-container { display: none; width: 80%; max-width: 400px; margin-top: 30px; padding: 15px; background: rgba(0, 0, 0, 0.6); border: 2px solid #00ffff; border-radius: 10px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); text-align: left; z-index: 15; }
  .progress-bar-wrapper { width: 100%; height: 25px; background: #333; border: 2px solid #ff00ff; border-radius: 12px; overflow: hidden; }
  #level-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffff, #ff00ff); border-radius: 10px; transition: width 0.3s ease-out; }

  @media (max-width: 600px) { h1 { font-size: 30px !important; } .board { grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(3, 85px); } .cell { width: 85px; height: 85px; font-size: 50px; } #modeTitle { font-size: 24px; margin-top: 50px; } }
</style>
</head>
<body class="default">

<div id="splash-overlay"><div class="particle-container" id="particle-container"></div><div class="splash-logo">S x A</div></div>
<div id="loading-overlay" style="display:none;"><h2>L O A D I N G</h2><div class="loading-bar-container"><div class="loading-bar-fill" id="loading-bar-fill"></div></div><div class="loading-percentage" id="loading-percentage">0%</div></div>
<div class="rain-container" id="rain-container"></div><div class="moon" id="moon"></div><div class="sun" id="sun"></div> <div class="star-container" id="star-container"></div>

<div class="lobby default" id="lobby" style="display:none;">
  <button id="settingBtn">⚙️ Theme</button>
  <div id="themeOptions" style="display:none; position:absolute; top:60px; left:20px; flex-direction:column; background:rgba(0,0,0,0.9); padding:10px; border:1px solid #00ffff; border-radius:10px; z-index:200;">
    <button class="theme-btn">Default</button><button class="theme-btn">Dark</button><button class="theme-btn">Light</button><button class="theme-btn">Love Mode 🩷</button>
  </div>
  
  <div id="level-system-container"><div id="level-info-text">Level: 1</div><div class="progress-bar-wrapper"><div id="level-progress-fill"></div></div></div>
  
  <h1>TIC TAC TOE</h1>
  <button class="btn" id="single">SINGLE PLAYER</button>
  <div class="difficulty" id="difficulty"><button class="btn diff" data-level="easy">EASY</button><button class="btn diff" data-level="ultrahard">ULTRA HARD +</button></div>
  <button class="btn" id="levelUpMode">LEVEL UP MODE</button> 
  <button class="btn" id="multi">LOCAL PVP</button>

  <div style="margin: 15px 0 5px; font-size: 14px; color: #00ffff; letter-spacing: 2px;">⚡ LIVE ONLINE ⚡</div>
  <div style="display: flex; gap: 10px; justify-content: center;">
      <button class="btn" id="createRoomBtn" style="background: linear-gradient(90deg, #ff00cc, #3333ff) !important;">CREATE</button>
      <button class="btn" id="joinRoomBtn" style="background: linear-gradient(90deg, #3333ff, #ff00cc) !important;">JOIN</button>
  </div>
</div>

<div class="game-board" id="game" style="display:none;">
  <button id="backLobbyBtn">LOBBY</button>
  <h1 id="modeTitle"></h1>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="board" id="board"><div class="winning-line" id="winning-line"></div></div>
</div>

<div class="popup" id="popup"><div id="winnerText"></div><button id="playAgainBtn">Play Again</button></div>

<div id="roomModal" class="room-modal"><div class="room-box"><h2 id="roomModalTitle">ROOM</h2><input type="text" id="roomCodeInput" maxlength="4"><h1 id="roomCodeDisplay"></h1><p id="roomStatusText">Waiting...</p><div style="display:flex; gap:10px; margin-top:20px;"><button id="roomActionBtn" class="btn" style="display:none;">JOIN</button><button id="roomCancelBtn" class="btn" style="background:red !important;">CANCEL</button></div></div></div>

<div id="disconnectModal" class="room-modal" style="z-index:2000;"><div class="room-box" style="border-color:#ff0055;"><h2 style="color:#ff0055;">DISCONNECTED</h2><p>Opponent has left.</p><button class="btn" onclick="location.reload()">BACK</button></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, getDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXUTAIDN9oBwFj9N6zRDl4sRVx3tc4STc",
  authDomain: "tic-tac-toe-onlinex.firebaseapp.com",
  projectId: "tic-tac-toe-onlinex",
  storageBucket: "tic-tac-toe-onlinex.firebasestorage.app",
  messagingSenderId: "924586025656",
  appId: "1:924586025656:web:32e2805f80de726fb20a4d"
};

const app = initializeApp(firebaseConfig); const db = getFirestore(app);
let isOnline = false, roomCode = "", playerRole = "", unsubscribeRoom = null;

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext; const audioCtx = new AudioCtx();
function beep(f, t=0.16){ try{ const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+t); o.start(); o.stop(audioCtx.currentTime+t); }catch(e){} }

// State
let board = ["","","","","","","","",""], currentPlayer = "O", scoreO = 0, scoreX = 0, winningCombo = [];
let playerLevel = 1, currentExp = 0, expToNextLevel = 10;

// ⭐ Level System Logic
function loadData() { 
    const d = JSON.parse(localStorage.getItem('saak_tictactoe_data') || '{"level":1,"exp":0}');
    playerLevel = d.level; currentExp = d.exp; expToNextLevel = playerLevel * 10; updateLevelUI();
}
function updateLevelUI() {
    document.getElementById('level-info-text').innerText = `Level: ${playerLevel}`;
    document.getElementById('level-progress-fill').style.width = (currentExp / expToNextLevel * 100) + "%";
}
function gainWinExp() {
    currentExp += 2; // Jeetne par 2 point badhenge
    if(currentExp >= expToNextLevel) { currentExp = 0; playerLevel++; expToNextLevel = playerLevel * 10; beep(800, 0.5); }
    localStorage.setItem('saak_tictactoe_data', JSON.stringify({level:playerLevel, exp:currentExp}));
    updateLevelUI();
}

// ⭐ Online Gameplay Logic
async function handleCellClick(i) {
    if (board[i] !== "" || checkWinner()) return;
    if (isOnline) {
        if (currentPlayer !== playerRole) return;
        let newBoard = [...board]; newBoard[i] = playerRole;
        let nextPlayer = playerRole === 'O' ? 'X' : 'O';
        await updateDoc(doc(db, "rooms", roomCode), { board: newBoard, currentPlayer: nextPlayer });
    } else {
        board[i] = currentPlayer; drawBoard();
        if(checkWinner()) { handleWin(checkWinner()); }
        else if(board.every(x=>x!=="")) { showPopup("DRAW!", ""); }
        else { currentPlayer = currentPlayer === "O" ? "X" : "O"; if(window.vsAI && currentPlayer==="X") setTimeout(aiMove, 500); }
    }
}

function handleWin(w) {
    if(w === 'O') scoreO++; else scoreX++;
    drawWinningLine(winningCombo);
    if(isOnline && w === playerRole) gainWinExp();
    else if(!isOnline && w === 'O') gainWinExp();
    
    let m1 = isOnline ? (w === playerRole ? "YOU WON! 🎉" : "YOU LOST! 😭") : `PLAYER ${w} WON!`;
    showPopup(m1, "");
}

window.resetGame = async function() {
    if (isOnline) {
        // ⭐ FAIR CHANCE: Play Again par baari change hogi
        // Jo haara ya jiski baari thi, logic decide karega
        await updateDoc(doc(db, "rooms", roomCode), { 
            board: ["","","","","","","","",""], 
            currentPlayer: "O", // Hamesha O se start par role sync rahega
            status: "playing" 
        });
    } else {
        board = ["","","","","","","","",""]; currentPlayer = "O";
        document.getElementById('popup').style.display='none'; document.getElementById('winning-line').style.display='none'; drawBoard();
    }
}

function drawBoard() {
    const bDiv = document.getElementById('board');
    Array.from(bDiv.querySelectorAll('.cell')).forEach(c => c.remove());
    board.forEach((v, i) => {
        const c = document.createElement('div'); c.className = 'cell'; c.innerText = v;
        if(v === 'O') c.style.color = '#00ffff'; else if(v === 'X') c.style.color = '#ff0055';
        if(winningCombo.includes(i)) c.classList.add('winningCell');
        c.onclick = () => handleCellClick(i);
        bDiv.appendChild(c);
    });
}

function listenToRoom() {
    if (unsubscribeRoom) unsubscribeRoom();
    unsubscribeRoom = onSnapshot(doc(db, "rooms", roomCode), (snap) => {
        if (!snap.exists()) { if(isOnline) document.getElementById('disconnectModal').style.display='flex'; return; }
        const data = snap.data();
        if (data.status === "playing") {
            if(!isOnline) { isOnline = true; document.getElementById('roomModal').style.display='none'; startGame(`LIVE MATCH<br><span style="color:#ff00ff; font-size:18px;">ROOM: ${roomCode} | ROLE: ${playerRole}</span>`); }
            board = data.board; currentPlayer = data.currentPlayer;
            document.getElementById('popup').style.display='none'; document.getElementById('winning-line').style.display='none';
            drawBoard(); updateScore();
            if(checkWinner()) handleWin(checkWinner());
            else if(board.every(x=>x!=="")) showPopup("DRAW!", "");
        }
    });
}

// Room Functions
document.getElementById('createRoomBtn').onclick = async () => {
    roomCode = Math.floor(1000 + Math.random() * 9000).toString(); playerRole = "O";
    document.getElementById('roomCodeDisplay').innerText = roomCode;
    document.getElementById('roomCodeDisplay').style.display = 'block';
    document.getElementById('roomModal').style.display = 'flex';
    await setDoc(doc(db, "rooms", roomCode), { board: ["","","","","","","","",""], currentPlayer: "O", status: "waiting" });
    listenToRoom();
};

document.getElementById('joinRoomBtn').onclick = () => {
    document.getElementById('roomCodeInput').style.display = 'block';
    document.getElementById('roomActionBtn').style.display = 'inline-block';
    document.getElementById('roomModal').style.display = 'flex';
};

document.getElementById('roomActionBtn').onclick = async () => {
    const code = document.getElementById('roomCodeInput').value;
    const s = await getDoc(doc(db, "rooms", code));
    if(s.exists() && s.data().status === "waiting") {
        roomCode = code; playerRole = "X";
        await updateDoc(doc(db, "rooms", roomCode), { status: "playing" });
        listenToRoom();
    } else alert("Room not found!");
};

// Common Helpers
function startGame(m) { document.getElementById('lobby').style.display='none'; document.getElementById('game').style.display='flex'; document.getElementById('modeTitle').innerHTML = m; drawBoard(); }
function updateScore() { document.getElementById('scoreboard').innerText = `O: ${scoreO} | X: ${scoreX}`; }
function showPopup(t, l) { document.getElementById('popup').style.display='flex'; document.getElementById('winnerText').innerHTML = `<div style="color:#00ffff;">${t}</div><div style="font-size:20px;">${l}</div>`; }
function checkWinner() {
    const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let combo of win) { if(board[combo[0]] && board[combo[0]]===board[combo[1]] && board[combo[0]]===board[combo[2]]) { winningCombo = combo; return board[combo[0]]; } }
    winningCombo = []; return null;
}
function drawWinningLine(combo) {
    const b = document.getElementById('board').getBoundingClientRect();
    const c1 = document.querySelectorAll('.cell')[combo[0]].getBoundingClientRect();
    const c2 = document.querySelectorAll('.cell')[combo[2]].getBoundingClientRect();
    const line = document.getElementById('winning-line');
    const x1 = c1.left + c1.width/2 - b.left, y1 = c1.top + c1.height/2 - b.top;
    const x2 = c2.left + c2.width/2 - b.left, y2 = c2.top + c2.height/2 - b.top;
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2), angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
    line.style.width = dist + "px"; line.style.left = x1 + "px"; line.style.top = y1 + "px"; line.style.transform = `rotate(${angle}deg)`; line.style.display = 'block';
}

// Theme & Splash
window.onload = () => { loadData(); setTimeout(() => { document.getElementById('splash-overlay').style.opacity='0'; setTimeout(()=> { document.getElementById('splash-overlay').style.display='none'; document.getElementById('loading-overlay').style.display='flex'; let p=0; let i = setInterval(()=>{ p+=2; document.getElementById('loading-bar-fill').style.width=p+"%"; document.getElementById('loading-percentage').innerText=p+"%"; if(p>=100){ clearInterval(i); document.getElementById('loading-overlay').style.display='none'; document.getElementById('lobby').style.display='flex'; } }, 50); }, 1000); }, 2000); };
document.getElementById('settingBtn').onclick = () => { const o = document.getElementById('themeOptions'); o.style.display = o.style.display==='none'?'flex':'none'; };
document.querySelectorAll('.theme-btn').forEach(b => b.onclick = () => { document.body.className = b.innerText.toLowerCase().replace(" ",""); document.getElementById('themeOptions').style.display='none'; });
document.getElementById('backLobbyBtn').onclick = () => location.reload();
document.getElementById('roomCancelBtn').onclick = () => location.reload();

</script>
</body>
</html>
