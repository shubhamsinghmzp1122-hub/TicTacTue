<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, getDoc, onSnapshot, deleteDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXUTAIDN9oBwFj9N6zRDl4sRVx3tc4STc",
  authDomain: "tic-tac-toe-onlinex.firebaseapp.com",
  projectId: "tic-tac-toe-onlinex",
  storageBucket: "tic-tac-toe-onlinex.firebasestorage.app",
  messagingSenderId: "924586025656",
  appId: "1:924586025656:web:32e2805f80de726fb20a4d"
};

const app = initializeApp(firebaseConfig); const db = getFirestore(app);
let isOnline = false, roomCode = "", playerRole = "", unsubscribeRoom = null;

// ⭐ WebRTC (Voice Chat) Setup ⭐
let pc = null, localStream = null;
const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

async function startVoiceChat(isCreator) {
    pc = new RTCPeerConnection(servers);
    let remoteStream = new MediaStream();
    document.getElementById('remoteAudio').srcObject = remoteStream;

    pc.ontrack = e => { e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t)); };

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        localStream.getAudioTracks()[0].enabled = false; // Muted initially
        document.getElementById('micBtn').style.display = 'block';
    } catch(e) { console.log("Mic Denied/Error"); }

    const roomRef = doc(db, "rooms", roomCode);

    if (isCreator) {
        pc.onicecandidate = e => { if(e.candidate) addDoc(collection(roomRef, "callerCandidates"), e.candidate.toJSON()); }
        const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
        await updateDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp } });
        onSnapshot(roomRef, snap => { const d = snap.data(); if(d && d.answer && !pc.currentRemoteDescription) pc.setRemoteDescription(new RTCSessionDescription(d.answer)); });
        onSnapshot(collection(roomRef, "calleeCandidates"), snap => { snap.docChanges().forEach(c => { if(c.type==='added') pc.addIceCandidate(new RTCIceCandidate(c.doc.data())); }); });
    } else {
        pc.onicecandidate = e => { if(e.candidate) addDoc(collection(roomRef, "calleeCandidates"), e.candidate.toJSON()); }
        const roomSnap = await getDoc(roomRef);
        await pc.setRemoteDescription(new RTCSessionDescription(roomSnap.data().offer));
        const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
        await updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });
        onSnapshot(collection(roomRef, "callerCandidates"), snap => { snap.docChanges().forEach(c => { if(c.type==='added') pc.addIceCandidate(new RTCIceCandidate(c.doc.data())); }); });
    }
}

document.getElementById('micBtn').onclick = () => {
    if(localStream) {
        const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
        const btn = document.getElementById('micBtn');
        btn.innerText = t.enabled ? '🎙️ Mic: ON' : '🔇 Mic: OFF';
        btn.style.color = t.enabled ? '#00ff4d' : '#ff0000';
        btn.style.borderColor = t.enabled ? '#00ff4d' : '#ff0000';
        btn.style.boxShadow = t.enabled ? '0 0 10px #00ff4d' : '0 0 10px #ff0000';
    }
};

// Audio & Basic Logic
const AudioCtx = window.AudioContext || window.webkitAudioContext; const audioCtx = new AudioCtx();
function beep(f, t=0.16){ try{ const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+t); o.start(); o.stop(audioCtx.currentTime+t); }catch(e){} }
function tapSound() { beep(420,0.14); } function aiMoveSound() { beep(300,0.24); } function winOSound(){ beep(800,0.1); setTimeout(()=>beep(950,0.1),100); setTimeout(()=>beep(1100,0.1),200); } function winXSound(){ beep(400,0.1); setTimeout(()=>beep(350,0.1),100); setTimeout(()=>beep(300,0.1),200); } function drawSound(){ beep(500,0.12); setTimeout(()=>beep(250,0.2),120); } 

let board = ["","","","","","","","",""], currentPlayer = "O", scoreO = 0, scoreX = 0, winningCombo = [];
let playerLevel = 1, currentExp = 0, expToNextLevel = 10;
function loadData() { const d = JSON.parse(localStorage.getItem('saak_tictactoe_data') || '{"level":1,"exp":0}'); playerLevel = d.level; currentExp = d.exp; expToNextLevel = playerLevel * 10; updateLevelUI(); }
function updateLevelUI() { document.getElementById('level-info-text').innerText = `Level: ${playerLevel}`; document.getElementById('level-progress-fill').style.width = (currentExp / expToNextLevel * 100) + "%"; }
function gainWinExp() { currentExp += 2; if(currentExp >= expToNextLevel) { currentExp = 0; playerLevel++; expToNextLevel = playerLevel * 10; beep(800, 0.5); } localStorage.setItem('saak_tictactoe_data', JSON.stringify({level:playerLevel, exp:currentExp})); updateLevelUI(); }

async function handleCellClick(i) {
    if (board[i] !== "" || checkWinner()) return;
    if (isOnline) {
        if (currentPlayer !== playerRole) return;
        let newBoard = [...board]; newBoard[i] = playerRole; let nextPlayer = playerRole === 'O' ? 'X' : 'O';
        await updateDoc(doc(db, "rooms", roomCode), { board: newBoard, currentPlayer: nextPlayer });
    } else {
        board[i] = currentPlayer; drawBoard();
        if(checkWinner()) handleWin(checkWinner()); else if(board.every(x=>x!=="")) showPopup("DRAW!", "");
        else { currentPlayer = currentPlayer === "O" ? "X" : "O"; if(window.vsAI && currentPlayer==="X") setTimeout(aiMove, 500); }
    }
}

function handleWin(w) {
    if(w === 'O') scoreO++; else scoreX++; drawWinningLine(winningCombo);
    if(isOnline && w === playerRole) gainWinExp(); else if(!isOnline && w === 'O') gainWinExp();
    let m1 = isOnline ? (w === playerRole ? "YOU WON! 🎉" : "YOU LOST! 😭") : `PLAYER ${w} WON!`; showPopup(m1, "");
}

window.resetGame = async function() {
    if (isOnline) {
        let nextStarter = window.startingTurn === 'O' ? 'X' : 'O'; 
        await updateDoc(doc(db, "rooms", roomCode), { board: ["","","","","","","","",""], currentPlayer: nextStarter, startingTurn: nextStarter, status: "playing" }); return; 
    } else { board = ["","","","","","","","",""]; currentPlayer = "O"; document.getElementById('popup').style.display='none'; document.getElementById('winning-line').style.display='none'; drawBoard(); }
}

function drawBoard() {
    const bDiv = document.getElementById('board'); Array.from(bDiv.querySelectorAll('.cell')).forEach(c => c.remove());
    board.forEach((v, i) => {
        const c = document.createElement('div'); c.className = 'cell'; c.innerText = v;
        if(v === 'O') c.style.color = '#00ffff'; else if(v === 'X') c.style.color = '#ff0055';
        if(winningCombo.includes(i)) c.classList.add('winningCell'); c.onclick = () => handleCellClick(i); bDiv.appendChild(c);
    });
}

function listenToRoom() {
    if (unsubscribeRoom) unsubscribeRoom();
    unsubscribeRoom = onSnapshot(doc(db, "rooms", roomCode), (snap) => {
        if (!snap.exists()) { if(isOnline) document.getElementById('disconnectModal').style.display='flex'; return; }
        const data = snap.data(); window.startingTurn = data.startingTurn || "O";
        if (data.status === "playing" && !isOnline) {
            isOnline = true; document.getElementById('roomModal').style.display='none'; startGame(`LIVE MATCH<br><span style="color:#ff00ff; font-size:18px;">ROOM: ${roomCode} | ROLE: ${playerRole}</span>`);
            startVoiceChat(playerRole === "O"); // ⭐ START VOICE CHAT WHEN GAME BEGINS
        }
        if (isOnline) {
            let changed = JSON.stringify(board) !== JSON.stringify(data.board); board = data.board; currentPlayer = data.currentPlayer;
            document.getElementById('popup').style.display='none'; document.getElementById('winning-line').style.display='none'; drawBoard(); updateScore();
            if(changed) { if(currentPlayer === playerRole) aiMoveSound(); else tapSound(); }
            if(checkWinner()) handleWin(checkWinner()); else if(board.every(x=>x!=="")) showPopup("DRAW!", "");
        }
    });
}

document.getElementById('createRoomBtn').onclick = async () => {
    roomCode = Math.floor(1000 + Math.random() * 9000).toString(); playerRole = "O";
    document.getElementById('roomCodeDisplay').innerText = roomCode; document.getElementById('roomCodeDisplay').style.display = 'block'; document.getElementById('roomModal').style.display = 'flex';
    await setDoc(doc(db, "rooms", roomCode), { board: ["","","","","","","","",""], currentPlayer: "O", startingTurn: "O", status: "waiting" }); listenToRoom();
};

document.getElementById('joinRoomBtn').onclick = () => { document.getElementById('roomCodeInput').style.display = 'block'; document.getElementById('roomActionBtn').style.display = 'inline-block'; document.getElementById('roomModal').style.display = 'flex'; };

document.getElementById('roomActionBtn').onclick = async () => {
    const code = document.getElementById('roomCodeInput').value;
    const s = await getDoc(doc(db, "rooms", code));
    if(s.exists() && s.data().status === "waiting") { roomCode = code; playerRole = "X"; await updateDoc(doc(db, "rooms", roomCode), { status: "playing" }); listenToRoom(); } else alert("Room not found!");
};

function startGame(m) { document.getElementById('lobby').style.display='none'; document.getElementById('game').style.display='flex'; document.getElementById('modeTitle').innerHTML = m; drawBoard(); }
function updateScore() { document.getElementById('scoreboard').innerText = `O: ${scoreO} | X: ${scoreX}`; }
function showPopup(t, l) { document.getElementById('popup').style.display='flex'; document.getElementById('winnerText').innerHTML = `<div style="color:#00ffff;">${t}</div><div style="font-size:20px;">${l}</div>`; }
function checkWinner() { const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let combo of win) { if(board[combo[0]] && board[combo[0]]===board[combo[1]] && board[combo[0]]===board[combo[2]]) { winningCombo = combo; return board[combo[0]]; } } winningCombo = []; return null; }
function drawWinningLine(combo) { const b = document.getElementById('board').getBoundingClientRect(); const c1 = document.querySelectorAll('.cell')[combo[0]].getBoundingClientRect(); const c2 = document.querySelectorAll('.cell')[combo[2]].getBoundingClientRect(); const line = document.getElementById('winning-line'); const x1 = c1.left + c1.width/2 - b.left, y1 = c1.top + c1.height/2 - b.top; const x2 = c2.left + c2.width/2 - b.left, y2 = c2.top + c2.height/2 - b.top; const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2), angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI; line.style.width = dist + "px"; line.style.left = x1 + "px"; line.style.top = y1 + "px"; line.style.transform = `rotate(${angle}deg)`; line.style.display = 'block'; }

window.onload = () => { loadData(); setTimeout(() => { document.getElementById('splash-overlay').style.opacity='0'; setTimeout(()=> { document.getElementById('splash-overlay').style.display='none'; document.getElementById('loading-overlay').style.display='flex'; let p=0; let i = setInterval(()=>{ p+=2; document.getElementById('loading-bar-fill').style.width=p+"%"; document.getElementById('loading-percentage').innerText=p+"%"; if(p>=100){ clearInterval(i); document.getElementById('loading-overlay').style.display='none'; document.getElementById('lobby').style.display='flex'; } }, 50); }, 1000); }, 2000); };
document.getElementById('settingBtn').onclick = () => { const o = document.getElementById('themeOptions'); o.style.display = o.style.display==='none'?'flex':'none'; };
document.querySelectorAll('.theme-btn').forEach(b => b.onclick = () => { document.body.className = b.innerText.toLowerCase().replace(" ",""); document.getElementById('themeOptions').style.display='none'; });
document.getElementById('backLobbyBtn').onclick = () => location.reload(); document.getElementById('roomCancelBtn').onclick = () => location.reload();
document.getElementById("single").onclick = ()=>{ window.vsAI = true; startGame('AI (EASY)'); }; document.getElementById("multi").onclick = ()=>{ window.vsAI = false; startGame('LOCAL PVP'); };
</script>
